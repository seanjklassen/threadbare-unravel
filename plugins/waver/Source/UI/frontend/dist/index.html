  transition: 
    opacity 440ms cubic-bezier(0.16, 0.84, 0.44, 1),
    transform 500ms cubic-bezier(0.16, 0.84, 0.44, 1),
    filter 460ms cubic-bezier(0.16, 0.84, 0.44, 1),
    visibility 0ms;
}

/* Preset options - spectral cascade with organic stagger */
.preset-option {
  padding: 13px 16px 14px 58px;
  font-size: 21px;
  color: var(--text);
  cursor: pointer;
  border-radius: 0;
  will-change: transform, opacity, filter;
  
  /* Hidden: blurred and faded */
  opacity: 0;
  transform: translateY(-4px);
  filter: blur(14px);
  
  /* Close: gentle simultaneous fade */
  transition:
    opacity 280ms cubic-bezier(0.4, 0, 0.1, 1),
    transform 340ms cubic-bezier(0.4, 0, 0.1, 1),
    filter 300ms cubic-bezier(0.4, 0, 0.1, 1),
    background 120ms ease;
}

/* Open: organic stagger - slower reveal, varied timing */
.tb-app.presets-open .preset-option {
  opacity: 1;
  transform: translateY(0) translateX(0);
  filter: blur(0px);
  
  transition:
    opacity 380ms cubic-bezier(0.16, 0.84, 0.44, 1),
    transform 520ms cubic-bezier(0.16, 0.84, 0.44, 1),
    filter 440ms cubic-bezier(0.16, 0.84, 0.44, 1),
    background 120ms ease;
}

/* Organic stagger: accelerating then decelerating rhythm */
.tb-app.presets-open .preset-option:nth-child(1) { transition-delay: 40ms; }
.tb-app.presets-open .preset-option:nth-child(2) { transition-delay: 75ms; }
.tb-app.presets-open .preset-option:nth-child(3) { transition-delay: 105ms; }
.tb-app.presets-open .preset-option:nth-child(4) { transition-delay: 130ms; }
.tb-app.presets-open .preset-option:nth-child(5) { transition-delay: 150ms; }
.tb-app.presets-open .preset-option:nth-child(6) { transition-delay: 168ms; }
.tb-app.presets-open .preset-option:nth-child(7) { transition-delay: 184ms; }
.tb-app.presets-open .preset-option:nth-child(8) { transition-delay: 198ms; }
.tb-app.presets-open .preset-option:nth-child(9) { transition-delay: 210ms; }
.tb-app.presets-open .preset-option:nth-child(10) { transition-delay: 220ms; }

/* ===== PRESET HOVER - "Focusing Attention" Effect ===== */
/* 
 * Hovering = directing attention to a memory
 * Non-hovered items blur and fade (defocus)
 * Hovered item drifts slightly into focus
 * Asymmetric timing: fast in, slow out (lingering)
 * Note: Only hover triggers defocus (not focus) to avoid blur on initial open
 */

/* Hovered/focused item: drifts right, soft radial glow background */
.tb-app.presets-open .preset-option:hover,
.tb-app.presets-open .preset-option:focus-visible {
  transform: translateX(3px) translateY(0);
  background: radial-gradient(ellipse at 20% 50%, rgba(255, 255, 255, 0.07) 0%, transparent 70%);
  filter: blur(0px);
  opacity: 1;
  outline: none;
  
  /* Fast focus IN */
  transition:
    opacity 160ms cubic-bezier(0.16, 0.84, 0.44, 1),
    transform 200ms cubic-bezier(0.16, 0.84, 0.44, 1),
    filter 180ms cubic-bezier(0.16, 0.84, 0.44, 1),
    background 150ms ease;
}

/* Sibling defocus: only on hover (not focus) to prevent blur on initial open */
.tb-app.presets-open .preset-dropdown:has(.preset-option:hover) .preset-option:not(:hover) {
  filter: blur(2px);
  opacity: 0.7;
  
  /* Slow defocus OUT (lingering) */
  transition:
    opacity 500ms cubic-bezier(0.4, 0, 0.1, 1),
    transform 600ms cubic-bezier(0.4, 0, 0.1, 1),
    filter 550ms cubic-bezier(0.4, 0, 0.1, 1),
    background 120ms ease;
}

.preset-option.selected {
  color: var(--accent);
}

.tb-app.presets-open .preset-option:active {
  background: radial-gradient(ellipse at 20% 50%, rgba(255, 255, 255, 0.12) 0%, transparent 70%);
  transform: translateX(3px) scale(0.995);
}

/* ===== SELECTION EFFECT - "Memory Lock-In" ===== */
/*
 * When selecting a preset:
 * 1. Selected item pulses briefly (scale)
 * 2. Non-selected items dissolve (blur + fade + drift up)
 * 3. Brief linger moment
 * 4. Then normal close animation
 */

/* Selected item during selection - pulse and stay sharp */
.tb-app.presets-open.selecting .preset-option.selecting-target {
  transform: translateX(3px) translateY(0) scale(1.01);
  filter: blur(0px);
  opacity: 1;
  background: radial-gradient(ellipse at 20% 50%, rgba(255, 255, 255, 0.08) 0%, transparent 70%);
  
  transition:
    transform 100ms cubic-bezier(0.22, 1, 0.36, 1),
    filter 80ms ease,
    opacity 80ms ease,
    background 100ms ease;
}

/* Non-selected items dissolve away - quick and airy */
.tb-app.presets-open.selecting .preset-option:not(.selecting-target) {
  filter: blur(6px);
  opacity: 0.3;
  transform: translateY(-2px) translateX(0);
  
  transition:
    filter 100ms cubic-bezier(0.4, 0, 0.2, 1),
    opacity 120ms cubic-bezier(0.4, 0, 0.2, 1),
    transform 100ms cubic-bezier(0.4, 0, 0.2, 1);
}

/* Chevron rotation when open with bounce */
@keyframes chevron-flip {
  0% { transform: rotate(0deg); }
  50% { transform: rotate(200deg); }
  75% { transform: rotate(170deg); }
  100% { transform: rotate(180deg); }
}

@keyframes chevron-unflip {

}

.preset-pill .chevron {

}

}

.tb-app.presets-open .preset-pill.has-opened .chevron {

}

/* ===== SETTINGS VIEW (Overlay with fade + slide from bottom) ===== */

/* 
 * Overlay transition: Settings fades in over main content.
 * Matches preset dropdown style but from the bottom.
 * 
 * TUNING: Adjust --settings-slide-distance to change how far it slides up.
 *         Larger = more dramatic entrance, smaller = more subtle.
 */

/* 
 * Settings drawer - spectral blur materialization
 * Slow, dreamy emergence from deep blur
 */
.settings-view {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 80px;
  background: rgba(49, 49, 43, 0.85);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 600;
  display: flex;
  flex-direction: column;
  pointer-events: none;
  will-change: transform, opacity, filter;
  overflow: visible;
  
  /* Hidden: deep blur, faded, shifted */
  opacity: 0;
  visibility: hidden;
  transform: translateY(16px) scale(0.985);
  filter: blur(36px);
  
  /* Close: slow, spectral fade into blur */
  transition: 
    opacity 600ms cubic-bezier(0.4, 0, 0.1, 1),
    transform 680ms cubic-bezier(0.4, 0, 0.1, 1),
    filter 640ms cubic-bezier(0.4, 0, 0.1, 1),
    visibility 0ms 680ms;
}

.settings-view.open {
  opacity: 1;
  visibility: visible;
  transform: translateY(0) scale(1);
  filter: blur(0px);
  pointer-events: auto;
  
  /* Open: unhurried emergence from ghostly blur */
  transition: 
    opacity 480ms cubic-bezier(0.16, 0.84, 0.44, 1),
    transform 540ms cubic-bezier(0.16, 0.84, 0.44, 1),
    filter 500ms cubic-bezier(0.16, 0.84, 0.44, 1),
    visibility 0ms;
}

/* Settings Body */
.settings-body {
  flex: 1;
  overflow-x: visible;
  overflow-y: auto;
  padding: 0 32px 32px;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* Settings Title */
.settings-title {
  position: absolute;
  top: 24px;   /* matches .tb-top-bar padding-top */
  left: 24px;  /* matches .tb-top-bar padding-left */

  height: 48px; /* matches .preset-pill height */
  display: inline-flex;
  align-items: center;

  padding: 0 60px 0 0; /* matches .preset-pill padding */
  border-radius: 21px;    /* matches .preset-pill radius */

  font-size: 21px;
  font-weight: 400;
  letter-spacing: -0.01em;
  text-transform: lowercase;
  color: var(--text);
  margin: 0;
  flex-shrink: 0;
  
  /* Always visible (settings view handles its own show/hide) */
  opacity: 1;
}

/* Clear old padding hack (title is now absolutely positioned) */
#settings-title { padding-bottom: 0; padding-left: 8px; }

/* Settings Content - holds the control rows */
.settings-content {
  display: flex;
  flex-direction: column;
  gap: 12px;
  flex-shrink: 0;
  padding-top: 72px;
  overflow: visible;
}

/* ===== SETTINGS CASCADE - Spectral blur materialization ===== */
.settings-title,
.settings-content > .control-row {
  will-change: transform, opacity, filter;
  
  /* Hidden: blurred and shifted */
  opacity: 0;
  transform: translateY(6px);
  filter: blur(18px);
  
  /* Close: gentle fade */
  transition:
    opacity 260ms cubic-bezier(0.4, 0, 0.1, 1),
    transform 320ms cubic-bezier(0.4, 0, 0.1, 1),
    filter 280ms cubic-bezier(0.4, 0, 0.1, 1);
}

/* Open: slower spectral materialization */
.settings-view.open .settings-title,
.settings-view.open .settings-content > .control-row {
  opacity: 1;
  transform: translateY(0);
  filter: blur(0px);
  
  transition:
    opacity 400ms cubic-bezier(0.16, 0.84, 0.44, 1),
    transform 500ms cubic-bezier(0.16, 0.84, 0.44, 1),
    filter 440ms cubic-bezier(0.16, 0.84, 0.44, 1);
}

/* Title materializes first */
.settings-view.open .settings-title {
  transition-delay: 50ms;
}

/* Organic stagger: accelerating then decelerating rhythm (matches preset menu) */
.settings-view.open .settings-content > .control-row:nth-child(1) { transition-delay: 80ms; }
.settings-view.open .settings-content > .control-row:nth-child(2) { transition-delay: 115ms; }
.settings-view.open .settings-content > .control-row:nth-child(3) { transition-delay: 145ms; }
.settings-view.open .settings-content > .control-row:nth-child(4) { transition-delay: 170ms; }
.settings-view.open .settings-content > .control-row:nth-child(5) { transition-delay: 192ms; }
.settings-view.open .settings-content > .control-row:nth-child(6) { transition-delay: 212ms; }
.settings-view.open .settings-content > .control-row:nth-child(7) { transition-delay: 230ms; }
.settings-view.open .settings-content > .control-row:nth-child(8) { transition-delay: 246ms; }
.settings-view.open .settings-content > .control-row:nth-child(9) { transition-delay: 260ms; }
.settings-view.open .settings-content > .control-row:nth-child(10) { transition-delay: 272ms; }

/* ===== CONTROL ROWS ===== */
/* Control rows (no cascade animation - DAW-friendly) */
.control-row {
  display: grid;
  grid-template-columns: 24px 1fr;
  row-gap: 24px;
  column-gap: 24px;
  align-items: center;
  overflow: visible;
}

.param-label {

}

.control-row:hover .param-label svg {
  opacity: 1;
}

/* ===== ICON TOOLTIPS ===== */
/* Minimal tooltip using readout text styles, appears on hover after delay */
.param-label {
  position: relative;
}

.param-label[data-tooltip]::after {
  content: attr(data-tooltip);
  position: absolute;
  left: 50%;
  top: calc(100%);
  transform: translateX(-50%);
  z-index: 10;
  
  /* Readout text style */
  font-size: 12px;
  line-height: 1;
  color: var(--text);
  white-space: nowrap;
  
  /* Subtle background for legibility */
  background: rgba(49, 49, 43, 0.9);
  padding: 4px 8px;
  border-radius: 4px;
  
  /* Invisible by default */
  opacity: 0;
  pointer-events: none;
  
  /* Delay before appearing */
  transition: opacity 180ms ease 400ms;
}

/* Show tooltip on hover (after delay) */
.control-row:hover .param-label[data-tooltip]::after {
  opacity: 0.6;
}

/* Edge protection: if tooltip would overflow right, position left instead */
/* (Using CSS container queries would be ideal but fallback to JS if needed) */

/* Screen reader only - keeps text accessible but visually hidden */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

/* ===== ELASTIC SLIDER (Organic Curve Design) ===== */
.elastic-slider {
  position: relative;
  width: 100%;
  height: 40px;
  display: flex;
  align-items: center;
  cursor: pointer;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  overflow: visible;
}

/* Fine control mode indicator (when holding Shift) */
.elastic-slider.fine-control {
  cursor: ew-resize;
}

/* Invisible track for pointer hit-testing */
.elastic-slider__track {
  position: absolute;
  inset: 0;
  background: transparent;
}

/* SVG container for organic curve */
.slider-svg {
  position: absolute;
  width: 100%;
  height: 100%;
  overflow: hidden;
  pointer-events: none;
}

/* Curved path - 2pt stroke */
.slider-path {
  stroke: var(--text);
  stroke-width: 1.5;
  stroke-linecap: round;
  fill: none;
  transition: stroke 0.2s ease;
  vector-effect: non-scaling-stroke;
}

/* Circular thumb (16x16) - vertically centered with line */
.slider-thumb {
  position: absolute;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--text);
  top: 50%;
  left: 0;
  transform: translate(-50%, -50%);
  pointer-events: auto;
  cursor: pointer;
  /* Only transition background color, not position/transform */
  transition: background 0.2s ease;
}

/* Hover state - lime accent */
.elastic-slider:hover .slider-path,
.control-row:hover .slider-path {
  stroke: var(--accent);
}

.elastic-slider:hover .slider-thumb,
.control-row:hover .slider-thumb {
  background: var(--accent);
}

/* Active/dragging state - no transition for immediate response */
.elastic-slider.active .slider-path,
.elastic-slider.active .slider-thumb {
  transition: none;
}

/* Hide legacy slider elements */
.slider-container {
  display: none;
}

.slider-track-bg,
.slider-track-base,
.slider-track-macro,
.param-slider {
  display: none;
}

/* ===== REDUCED MOTION ===== */
@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }

  /* Disable blur and stagger effects under reduced motion */
  .preset-dropdown,
  .settings-view,
  .settings-title,
  .settings-content > .control-row,
  .preset-option {
    transition-delay: 0ms !important;
    transform: none !important;
    filter: none !important;
  }
