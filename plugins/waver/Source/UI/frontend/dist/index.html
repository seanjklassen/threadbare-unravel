  --focus-ring-strong: 0 0 0 3px var(--bg), 0 0 0 5px var(--focus-ring-color);
  /* Subtle by default; pressed uses a tighter, "closer to surface" shadow */
  --puck-shadow:
    0 10px 16px -10px rgba(0, 0, 0, 0.20),
    0 4px 7px -6px rgba(0, 0, 0, 0.18),
    0 1px 2px -1px rgba(0, 0, 0, 0.16);
  --puck-shadow-pressed:
    0 4px 8px -7px rgba(0, 0, 0, 0.26),
    0 1px 2px -1px rgba(0, 0, 0, 0.22);
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro', 'Inter',
    sans-serif;
  font-weight: 400;
  letter-spacing: -0.01em;
  font-variant-numeric: tabular-nums;
  color: var(--text);
  background-color: var(--bg);
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
}

*,
*::before,
*::after {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
}

/* ===== FOCUS STATES ===== */
.preset-pill:focus-visible,
.btn-freeze:focus-visible,
.btn-settings:focus-visible,
.pupil-toggle:focus-visible {
  outline: none;
  box-shadow: none;
}

/* Focus uses hover styling (no ring) */
.preset-pill:focus-visible::before {
  background: rgba(255, 255, 255, 0.04);
  transform: scale(1.02);
}

.btn-freeze:focus-visible::before,
.btn-settings:focus-visible::before {
  background: rgba(255, 255, 255, 0.04);
  transform: scale(1);
}

.tb-app.settings-open .btn-settings:focus-visible::before {
  transform: scale(0.96);
  animation: none;
  background: var(--accent);
}

/* Elastic slider focus state */
.elastic-slider:focus-visible {
  outline: none;
  box-shadow: none;
}

.elastic-slider:focus-visible .slider-path {
  stroke: var(--accent);
}

.elastic-slider:focus-visible .slider-thumb {
  background: var(--accent);
  box-shadow: none;
}

/* ===== APP LOAD ANIMATION ===== */
@keyframes app-reveal {
  0% {
    opacity: 0;
    transform: scale(0.98);
  }
  100% {
    opacity: 1;
    transform: scale(1);
  }
}

.tb-app {
  position: relative;
  min-height: 100vh;
  overflow: hidden;
  isolation: isolate;
  animation: app-reveal 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

/* Staggered reveal for main UI sections */
.tb-top-bar {
  opacity: 0;
  animation: app-reveal 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
}

.tb-canvas-shell {
  opacity: 0;
  animation: app-reveal 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.15s forwards;
}

.tb-bottom-bar {
  opacity: 0;
  animation: app-reveal 0.5s cubic-bezier(0.22, 1, 0.36, 1) 0.25s forwards;
}

.tb-canvas-shell {
  position: absolute;
  top: 60px;
  bottom: 80px;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1;
  overflow: hidden;
}

#orb {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
  z-index: 1;
  background: transparent;
}

#puck {
  position: absolute;
  width: 48px;
  height: 48px;
  border-radius: 21px;
  /* Puck styling - designed to look good without backdrop-filter (not supported in JUCE WebView) */
  background: linear-gradient(
    145deg,
    rgba(255, 255, 255, 0.12) 0%,
    rgba(200, 200, 195, 0.06) 100%
  );
  box-shadow: 
    var(--puck-shadow),
    inset 0 0 0 1px rgba(255, 255, 255, 0.04);
  box-sizing: border-box;
  display: grid;
  place-items: center;
  --puck-press: 1;
  --puck-motion-angle: 0deg;
  --puck-stretch: 1;
  --puck-squash: 1;
  --pupil-offset-x: 0px;
  --pupil-offset-y: 0px;
  --puck-glass-blur: 20px; /* driven by JS */
  --puck-grain: 0.18;      /* driven by JS */
  /* Directional stretch: rotate to velocity direction, scale, rotate back */
  transform: translate(-50%, -50%) scale(var(--puck-press)) rotate(var(--puck-motion-angle)) scale(var(--puck-stretch), var(--puck-squash)) rotate(calc(-1 * var(--puck-motion-angle)));
  /* NOTE: No transform transition here - motion effects (stretch/squash) are applied per-frame via JS.
     Only transition box-shadow and background for smooth state changes. */
  transition: box-shadow 0.1s ease-out, background 0.2s ease-out;
  cursor: grab;
  -webkit-tap-highlight-color: transparent;
  z-index: 2;
  /* NOTE: backdrop-filter and will-change disabled - caused rendering artifacts in JUCE WebView */
  /* CSS fallback: center puck before JS positions it */
  left: 50%;
  top: 50%;
}

/* NOTE: SVG backdrop-filter url(#tb-frosted) disabled - causes rendering artifacts in JUCE WebView.
   Using standard blur backdrop-filter instead which works reliably across all targets. */

#puck.active,
.puck.active {
  cursor: grabbing;
  --puck-press: 0.97;
  /* Pressed: tighter shadow = closer to surface */
  box-shadow: var(--puck-shadow-pressed);
}

/* Outer frosted ring effect */
#puck::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  background: linear-gradient(
    135deg,
    rgba(255, 255, 255, 0.25) 0%,
    rgba(255, 255, 255, 0.05) 50%,
    rgba(200, 200, 195, 0.1) 100%
  );
  z-index: 1;
}

#puck::after {
  content: '';
  position: absolute;
  inset: 4px;
  border-radius: 17px;
  background: linear-gradient(
    145deg, 
    #FAFAF7 0%, 
    #F5F5F0 40%,
    #EEEEE8 100%
  );
  box-shadow: 
    inset 0 1px 2px rgba(255, 255, 255, 0.8),
    inset 0 -1px 1px rgba(0, 0, 0, 0.03);
  pointer-events: none;
  z-index: 0;
}



@keyframes puck-idle-breathe {
  0%, 100% {
    transform: scale(1);
  }
  50% {
    transform: scale(1.08);
  }
}

#puck.idle::after,
.puck.idle::after {
  animation: puck-idle-breathe 2.5s ease-in-out infinite;
}

.puck-pupil {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #969588;
  display: block;
  position: relative;
  z-index: 1;
  box-shadow:
    1px 1px 3px -1px rgba(0, 0, 0, 0.3) inset,
    0 0 6px rgba(175, 211, 228, 0.4);
  transition: background-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
  transform: translate(var(--pupil-offset-x), var(--pupil-offset-y)) scale(1);
}

#puck.active .puck-pupil,
.puck.active .puck-pupil {
  background-color: #9EAE5A;
  box-shadow: 0 0 8px #C5CC7A;
}

/* === AXIS LABELS (visible when dragging puck) === */
.tb-canvas-shell .axis-label {
  position: absolute;
  font-size: 12px;
  font-weight: 400;
  color: var(--text);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease-out;
  text-transform: lowercase;
  letter-spacing: 0.02em;
  z-index: 10;
  white-space: nowrap;
}

/* Show labels when puck is being dragged */
.tb-canvas-shell.puck-dragging .axis-label {
  opacity: 0.45;
}

/* Label positioning */
.tb-canvas-shell .axis-label-left {
  left: 24px;
  right: auto;
  top: 50%;
  bottom: auto;
  transform: translateY(-50%) rotate(-90deg);
  transform-origin: center center;
}

.tb-canvas-shell .axis-label-right {
  right: 24px;
  left: auto;
  top: 50%;
  bottom: auto;
  transform: translateY(-50%) rotate(90deg);
  transform-origin: center center;
}

.tb-canvas-shell .axis-label-top {
  top: 24px;
  bottom: auto;
  left: 50%;
  right: auto;
  transform: translateX(-50%);
}

.tb-canvas-shell .axis-label-bottom {
  bottom: 24px;
  top: auto;
  left: 50%;
  right: auto;
  transform: translateX(-50%);
}

/* === DISINTEGRATION LOOPER: Pupil States === */

/* Recording state: pupil turns salmon/coral to match button */
#puck.recording .puck-pupil,
.puck.recording .puck-pupil {
  background-color: #CC8A7E;
  box-shadow: 
    1px 1px 3px -1px rgba(0, 0, 0, 0.3) inset,
    0 0 8px rgba(204, 138, 126, 0.6);
  animation: pupil-recording-pulse 1.1s ease-in-out infinite;
}

/* Looping state: pupil breathing + blinking animation */
@keyframes pupil-breathe {
  0%, 100% { 
    transform: translate(var(--pupil-offset-x), var(--pupil-offset-y)) scale(1); 
    background-color: #969588;  /* Dimmed grayish-green (blink off) */
    box-shadow: 
      1px 1px 3px -1px rgba(0, 0, 0, 0.3) inset,
      0 0 4px rgba(154, 154, 122, 0.2);
  }
  50% { 
    transform: translate(var(--pupil-offset-x), var(--pupil-offset-y)) scale(1.3); 
    background-color: #C5CC7A;  /* Full green (blink on) */
    box-shadow: 
      1px 1px 3px -1px rgba(0, 0, 0, 0.3) inset,
      0 0 14px rgba(197, 204, 122, 0.8);
  }
}

@keyframes pupil-recording-pulse {
  0%, 100% {
    transform: translate(var(--pupil-offset-x), var(--pupil-offset-y)) scale(1);
    background-color: #CC8A7E;
    box-shadow:
      1px 1px 3px -1px rgba(0, 0, 0, 0.3) inset,
      0 0 6px rgba(204, 138, 126, 0.4);
  }
  50% {
    transform: translate(var(--pupil-offset-x), var(--pupil-offset-y)) scale(1.25);
    background-color: #CC8A7E;
    box-shadow:
      1px 1px 3px -1px rgba(0, 0, 0, 0.3) inset,
      0 0 12px rgba(204, 138, 126, 0.75);
  }
}

#puck.looping .puck-pupil,
.puck.looping .puck-pupil {
  animation: pupil-breathe 2s ease-in-out infinite;
}

/* === Ring Ripple: Mode Change Cue === */
/* One-time expanding ring when entering looping mode */
@keyframes puck-ripple {
  0% {
    transform: translate(-50%, -50%) scale(1);
    opacity: 0.6;
    border-width: 2px;
  }
  100% {
    transform: translate(-50%, -50%) scale(2.5);
    opacity: 0;
    border-width: 1px;
  }
}

/* Ripple pseudo-element - only shows during looping transition */
#puck.looping::before,
.puck.looping::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 2px solid #C5CC7A;
  transform: translate(-50%, -50%) scale(1);
  pointer-events: none;
  animation: puck-ripple 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  z-index: 0;
}

/* Recording state: coral ripple when starting to record */
@keyframes puck-ripple-record {
  0% {
    transform: translate(-50%, -50%) scale(1);
    opacity: 0.5;
    border-width: 2px;
  }
  100% {
    transform: translate(-50%, -50%) scale(2);
    opacity: 0;
    border-width: 1px;
  }
}

#puck.recording::before,
.puck.recording::before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 2px solid #CC8A7E;
  transform: translate(-50%, -50%) scale(1);
  pointer-events: none;
  animation: puck-ripple-record 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  z-index: 0;
}

.tb-top-bar {
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 16px;
  pointer-events: none;
  z-index: 400; /* Ensure top bar stays above canvas but below dropdown */
}

.tb-bottom-bar {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 24px 24px 24px 32px;
  pointer-events: none;
  z-index: 200;
  background: var(--bg);
}

.preset-pill {
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  height: 48px;
  border: none;
  background: transparent;
  color: var(--text);
  font-size: 21px;
  text-transform: lowercase;
  cursor: pointer;
  pointer-events: auto;
  padding: 0 20px 0 12px;
  border-radius: 21px;
  transition: color 160ms ease;
  z-index: 1;
}

/* Background pseudo-element for hover effects */
.preset-pill::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 21px;
  background: rgba(255, 255, 255, 0);
  transform: scale(1);
  transition: 
    background 0.2s cubic-bezier(0.22, 1, 0.36, 1),
    transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  z-index: -1;
}

.preset-pill:hover::before {
  background: rgba(255, 255, 255, 0.04);
  transform: scale(1.02);
}

.preset-pill:active::before {
  background: rgba(255, 255, 255, 0.08);
  transform: scale(0.96);
  transition: transform 0.08s cubic-bezier(0.22, 1, 0.36, 1);
}

/* Active/open styling (consistency): preset pill uses accent background while dropdown is open */
.tb-app.presets-open .preset-pill {
  color: var(--bg);
}

.tb-app.presets-open .preset-pill::before {
  background: var(--accent);
  transform: scale(1.02);
}

.tb-app.presets-open .preset-pill:hover::before,
.tb-app.presets-open .preset-pill:active::before {
  background: var(--accent);
}

/* ===== PRESET DROPDOWN ===== */
/* 
 * Spectral blur materialization - elements emerge from ghostly blur
 * Slow, dreamy timing with organic stagger
 */
.preset-dropdown {
  position: fixed;
  top: 80px;
  left: 0;
  right: 0;
  bottom: 0;
  overflow-y: auto;
  background: rgba(49, 49, 43, 0.85);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  border-radius: 0;
  padding: 0;
  margin: 0;
  list-style: none;
  z-index: 500;
  pointer-events: none;
  will-change: transform, opacity, filter;
  
  /* Hidden: ghostly blur, faded, scaled down */
  opacity: 0;
  visibility: hidden;
  transform: translateY(-8px) scale(0.988);
  filter: blur(28px);
  
  /* Close: slow, lingering fade into blur */
  transition: 
    opacity 520ms cubic-bezier(0.4, 0, 0.1, 1),
    transform 600ms cubic-bezier(0.4, 0, 0.1, 1),
    filter 560ms cubic-bezier(0.4, 0, 0.1, 1),
    visibility 0ms 600ms;
}

.tb-app.presets-open .preset-dropdown {
  opacity: 1;
  visibility: visible;
  transform: translateY(0) scale(1);
  filter: blur(0px);
  pointer-events: auto;
  
  /* Open: emerge from blur, still unhurried */
  transition: 
    opacity 440ms cubic-bezier(0.16, 0.84, 0.44, 1),
    transform 500ms cubic-bezier(0.16, 0.84, 0.44, 1),
    filter 460ms cubic-bezier(0.16, 0.84, 0.44, 1),
    visibility 0ms;
}

/* Preset options - spectral cascade with organic stagger */
.preset-option {
  padding: 13px 16px 14px 58px;
  font-size: 21px;
  color: var(--text);
  cursor: pointer;
  border-radius: 0;
  will-change: transform, opacity, filter;
  
  /* Hidden: blurred and faded */
  opacity: 0;
  transform: translateY(-4px);
  filter: blur(14px);
  
  /* Close: gentle simultaneous fade */
  transition:
    opacity 280ms cubic-bezier(0.4, 0, 0.1, 1),
    transform 340ms cubic-bezier(0.4, 0, 0.1, 1),
    filter 300ms cubic-bezier(0.4, 0, 0.1, 1),
    background 120ms ease;
}

/* Open: organic stagger - slower reveal, varied timing */
.tb-app.presets-open .preset-option {
  opacity: 1;
  transform: translateY(0) translateX(0);
  filter: blur(0px);
  
  transition:
    opacity 380ms cubic-bezier(0.16, 0.84, 0.44, 1),
    transform 520ms cubic-bezier(0.16, 0.84, 0.44, 1),
    filter 440ms cubic-bezier(0.16, 0.84, 0.44, 1),
    background 120ms ease;
}

/* Organic stagger: accelerating then decelerating rhythm */
.tb-app.presets-open .preset-option:nth-child(1) { transition-delay: 40ms; }
.tb-app.presets-open .preset-option:nth-child(2) { transition-delay: 75ms; }
.tb-app.presets-open .preset-option:nth-child(3) { transition-delay: 105ms; }
.tb-app.presets-open .preset-option:nth-child(4) { transition-delay: 130ms; }
.tb-app.presets-open .preset-option:nth-child(5) { transition-delay: 150ms; }
.tb-app.presets-open .preset-option:nth-child(6) { transition-delay: 168ms; }
.tb-app.presets-open .preset-option:nth-child(7) { transition-delay: 184ms; }
.tb-app.presets-open .preset-option:nth-child(8) { transition-delay: 198ms; }
.tb-app.presets-open .preset-option:nth-child(9) { transition-delay: 210ms; }
.tb-app.presets-open .preset-option:nth-child(10) { transition-delay: 220ms; }

/* ===== PRESET HOVER - "Focusing Attention" Effect ===== */
/* 
 * Hovering = directing attention to a memory
 * Non-hovered items blur and fade (defocus)
 * Hovered item drifts slightly into focus
 * Asymmetric timing: fast in, slow out (lingering)
 * Note: Only hover triggers defocus (not focus) to avoid blur on initial open
 */

/* Hovered/focused item: drifts right, soft radial glow background */
.tb-app.presets-open .preset-option:hover,
.tb-app.presets-open .preset-option:focus-visible {
  transform: translateX(3px) translateY(0);
  background: radial-gradient(ellipse at 20% 50%, rgba(255, 255, 255, 0.07) 0%, transparent 70%);
  filter: blur(0px);
  opacity: 1;
  outline: none;
  
  /* Fast focus IN */
  transition:
    opacity 160ms cubic-bezier(0.16, 0.84, 0.44, 1),
    transform 200ms cubic-bezier(0.16, 0.84, 0.44, 1),
    filter 180ms cubic-bezier(0.16, 0.84, 0.44, 1),
    background 150ms ease;
}

/* Sibling defocus: only on hover (not focus) to prevent blur on initial open */
.tb-app.presets-open .preset-dropdown:has(.preset-option:hover) .preset-option:not(:hover) {
  filter: blur(2px);
  opacity: 0.7;
  
  /* Slow defocus OUT (lingering) */
  transition:
    opacity 500ms cubic-bezier(0.4, 0, 0.1, 1),
    transform 600ms cubic-bezier(0.4, 0, 0.1, 1),
    filter 550ms cubic-bezier(0.4, 0, 0.1, 1),
    background 120ms ease;
}

.preset-option.selected {
  color: var(--accent);
}

.tb-app.presets-open .preset-option:active {
  background: radial-gradient(ellipse at 20% 50%, rgba(255, 255, 255, 0.12) 0%, transparent 70%);
  transform: translateX(3px) scale(0.995);
}

/* ===== SELECTION EFFECT - "Memory Lock-In" ===== */
/*
 * When selecting a preset:
 * 1. Selected item pulses briefly (scale)
 * 2. Non-selected items dissolve (blur + fade + drift up)
 * 3. Brief linger moment
 * 4. Then normal close animation
 */

/* Selected item during selection - pulse and stay sharp */
.tb-app.presets-open.selecting .preset-option.selecting-target {
  transform: translateX(3px) translateY(0) scale(1.01);
  filter: blur(0px);
  opacity: 1;
  background: radial-gradient(ellipse at 20% 50%, rgba(255, 255, 255, 0.08) 0%, transparent 70%);
  
  transition:
    transform 100ms cubic-bezier(0.22, 1, 0.36, 1),
    filter 80ms ease,
    opacity 80ms ease,
    background 100ms ease;
}

/* Non-selected items dissolve away - quick and airy */
.tb-app.presets-open.selecting .preset-option:not(.selecting-target) {
  filter: blur(6px);
  opacity: 0.3;
  transform: translateY(-2px) translateX(0);
  
  transition:
    filter 100ms cubic-bezier(0.4, 0, 0.2, 1),
    opacity 120ms cubic-bezier(0.4, 0, 0.2, 1),
    transform 100ms cubic-bezier(0.4, 0, 0.2, 1);
}

/* Chevron rotation when open with bounce */
@keyframes chevron-flip {
  0% { transform: rotate(0deg); }
  50% { transform: rotate(200deg); }
  75% { transform: rotate(170deg); }
  100% { transform: rotate(180deg); }
}

@keyframes chevron-unflip {
  0% { transform: rotate(180deg); }
  50% { transform: rotate(-20deg); }
  75% { transform: rotate(10deg); }
  100% { transform: rotate(0deg); }
}

.preset-pill .chevron {
  transition: transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
}

.tb-app.presets-open .preset-pill .chevron {
  animation: chevron-flip 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

/* Only animate unflip if it was previously opened (has-opened class) */
.preset-pill.has-opened:not(.open) .chevron {
  animation: chevron-unflip 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

.tb-app.presets-open .preset-pill.has-opened .chevron {
  animation: chevron-flip 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

.preset-pill .chevron {
  display: grid;
  place-items: center;
  width: 24px;
  height: 24px;
}

.preset-pill .chevron svg {
  width: 24px;
  height: 24px;
  display: block;
}

.preset-name {
  font-size: 21px;
  letter-spacing: -0.01em;
}

.logo-glyph {
  width: 48px;
  height: 48px;
  display: none;
  justify-content: center;
  align-items: center;
}

.logo-glyph svg {
  width: 24px;
  height: 24px;
  display: block;
  color: var(--text);
}

.tb-bottom-bar .readouts {
  display: flex;
  flex-direction: column;
  gap: 6px;
  font-size: 12px;
  line-height: 1;
}

.tb-bottom-bar .readouts span {
  display: block;
}

.tb-control-cluster {
  display: flex;
  gap: 8px;
  pointer-events: auto;
}

.btn-freeze,
.btn-settings {
  position: relative;
  width: 48px;
  height: 48px;
  border-radius: 21px;
  border: none;
  background: transparent;
  color: var(--text);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: color 160ms ease;
}

/* Background pseudo-element for hover/active effects */
.btn-freeze::before,
.btn-settings::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 21px;
  background: rgba(255, 255, 255, 0);
  transform: scale(1);
  transition: 
    background 0.2s cubic-bezier(0.22, 1, 0.36, 1),
    transform 0.3s cubic-bezier(0.22, 1, 0.36, 1);
  z-index: -1;
}

.btn-freeze:hover::before,
.btn-settings:hover::before {
  background: rgba(255, 255, 255, 0.04);
  transform: scale(1);
}

.btn-freeze:active::before,
.btn-settings:active::before {
  background: rgba(255, 255, 255, 0.16);
  transform: scale(0.96);
  transition: transform 0.08s cubic-bezier(0.22, 1, 0.36, 1);
}

/* Bounce animation for background on state toggle */
@keyframes btn-bg-bounce {
  0% { transform: scale(0.95); }
  35% { transform: scale(1.02); }
  100% { transform: scale(1); }
}

/* Armed state: waiting for transport */
.btn-freeze.armed-waiting::before {
  background: var(--accent);
  opacity: 0.18;
  transform: scale(1);
}

/* ═══════════════════════════════════════════════════════════════════════
   DISINTEGRATION LOOPER STATES
   Button color is controlled ONLY by looper state classes (recording/looping)
   No default active state - prevents "extra" lime green state
   ═══════════════════════════════════════════════════════════════════════ */

/* Recording state: pulsating dusty coral glow */
@keyframes recording-pulse {
  0% { box-shadow: 0 0 0 0 rgba(204, 138, 126, 0.7); }
  70% { box-shadow: 0 0 0 12px rgba(204, 138, 126, 0); }
  100% { box-shadow: 0 0 0 0 rgba(204, 138, 126, 0); }
}

.btn-freeze.recording,
.btn-freeze.recording[aria-pressed='true'] {
  color: var(--bg);
}

.btn-freeze.recording::before,
.btn-freeze.recording[aria-pressed='true']::before {
  background: #CC8A7E !important; /* Dusty coral for recording */
  animation: recording-pulse 1.2s ease-out infinite, btn-bg-bounce 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards !important;
}

/* Looping state: puck pupil green for harmonious playback indicator */
.btn-freeze.looping,
.btn-freeze.looping[aria-pressed='true'],
.btn-freeze.looping[aria-pressed='false'] {
  color: var(--bg);
}

.btn-freeze.looping::before,
.btn-freeze.looping[aria-pressed='true']::before,
.btn-freeze.looping[aria-pressed='false']::before {
  background: #C5CC7A !important;  /* Puck pupil green */
  animation: btn-bg-bounce 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

/* Disable preset and settings controls during looping (can't affect captured buffer) */
.tb-app.looping .preset-pill,
.tb-app.looping .btn-settings {
  opacity: 0.3;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

.btn-freeze svg,
.btn-settings .icon-settings {
  width: 24px;
  height: 24px;
  display: block;
  fill: currentColor;
}

/* Settings button icon toggle */
.btn-settings .icon-close {
  width: 24px;
  height: 24px;
  display: none;
  fill: currentColor;
}

/* When settings is open, show close icon and hide settings icon */
.tb-app.settings-open .btn-settings .icon-settings {
  display: none;
}

.tb-app.settings-open .btn-settings .icon-close {
  display: block;
}

/* Settings button transforms to close button when open (matches freeze active state) */
.tb-app.settings-open .btn-settings {
  color: var(--bg);
}

.tb-app.settings-open .btn-settings::before {
  background: var(--accent);
  animation: btn-bg-bounce 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

/* Hover state when settings is open - consistent with other buttons */
.tb-app.settings-open .btn-settings:hover::before {
  transform: scale(0.96);
  animation: none;
  background: var(--accent);
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

/* ===== SETTINGS VIEW (Overlay with fade + slide from bottom) ===== */

/* 
 * Overlay transition: Settings fades in over main content.
 * Matches preset dropdown style but from the bottom.
 * 
 * TUNING: Adjust --settings-slide-distance to change how far it slides up.
 *         Larger = more dramatic entrance, smaller = more subtle.
 */

/* 
 * Settings drawer - spectral blur materialization
 * Slow, dreamy emergence from deep blur
 */
.settings-view {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 80px;
  background: rgba(49, 49, 43, 0.85);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  z-index: 600;
  display: flex;
  flex-direction: column;
  pointer-events: none;
  will-change: transform, opacity, filter;
  overflow: visible;
  
  /* Hidden: deep blur, faded, shifted */
  opacity: 0;
  visibility: hidden;
  transform: translateY(16px) scale(0.985);
  filter: blur(36px);
  
  /* Close: slow, spectral fade into blur */
  transition: 
    opacity 600ms cubic-bezier(0.4, 0, 0.1, 1),
    transform 680ms cubic-bezier(0.4, 0, 0.1, 1),
    filter 640ms cubic-bezier(0.4, 0, 0.1, 1),
    visibility 0ms 680ms;
}

.settings-view.open {
  opacity: 1;
  visibility: visible;
  transform: translateY(0) scale(1);
  filter: blur(0px);
  pointer-events: auto;
  
  /* Open: unhurried emergence from ghostly blur */
  transition: 
    opacity 480ms cubic-bezier(0.16, 0.84, 0.44, 1),
    transform 540ms cubic-bezier(0.16, 0.84, 0.44, 1),
    filter 500ms cubic-bezier(0.16, 0.84, 0.44, 1),
    visibility 0ms;
}

/* Settings Body */
.settings-body {
  flex: 1;
  overflow-x: visible;
  overflow-y: auto;
  padding: 0 32px 32px;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

/* Settings Title */
.settings-title {
  position: absolute;
  top: 24px;   /* matches .tb-top-bar padding-top */
  left: 24px;  /* matches .tb-top-bar padding-left */

  height: 48px; /* matches .preset-pill height */
  display: inline-flex;
  align-items: center;

  padding: 0 60px 0 0; /* matches .preset-pill padding */
  border-radius: 21px;    /* matches .preset-pill radius */

  font-size: 21px;
  font-weight: 400;
  letter-spacing: -0.01em;
  text-transform: lowercase;
  color: var(--text);
  margin: 0;
  flex-shrink: 0;
  
  /* Always visible (settings view handles its own show/hide) */
  opacity: 1;
}

/* Clear old padding hack (title is now absolutely positioned) */
#settings-title { padding-bottom: 0; padding-left: 8px; }

/* Settings Content - holds the control rows */
.settings-content {
  display: flex;
  flex-direction: column;
  gap: 12px;
  flex-shrink: 0;
  padding-top: 72px;
  overflow: visible;
}

/* ===== SETTINGS CASCADE - Spectral blur materialization ===== */
.settings-title,
.settings-content > .control-row {
  will-change: transform, opacity, filter;
  
  /* Hidden: blurred and shifted */
  opacity: 0;
  transform: translateY(6px);
  filter: blur(18px);
  
  /* Close: gentle fade */
  transition:
    opacity 260ms cubic-bezier(0.4, 0, 0.1, 1),
    transform 320ms cubic-bezier(0.4, 0, 0.1, 1),
    filter 280ms cubic-bezier(0.4, 0, 0.1, 1);
}

/* Open: slower spectral materialization */
.settings-view.open .settings-title,
.settings-view.open .settings-content > .control-row {
  opacity: 1;
  transform: translateY(0);
  filter: blur(0px);
  
  transition:
    opacity 400ms cubic-bezier(0.16, 0.84, 0.44, 1),
    transform 500ms cubic-bezier(0.16, 0.84, 0.44, 1),
    filter 440ms cubic-bezier(0.16, 0.84, 0.44, 1);
}

/* Title materializes first */
.settings-view.open .settings-title {
  transition-delay: 50ms;
}

/* Organic stagger: accelerating then decelerating rhythm (matches preset menu) */
.settings-view.open .settings-content > .control-row:nth-child(1) { transition-delay: 80ms; }
.settings-view.open .settings-content > .control-row:nth-child(2) { transition-delay: 115ms; }
.settings-view.open .settings-content > .control-row:nth-child(3) { transition-delay: 145ms; }
.settings-view.open .settings-content > .control-row:nth-child(4) { transition-delay: 170ms; }
.settings-view.open .settings-content > .control-row:nth-child(5) { transition-delay: 192ms; }
.settings-view.open .settings-content > .control-row:nth-child(6) { transition-delay: 212ms; }
.settings-view.open .settings-content > .control-row:nth-child(7) { transition-delay: 230ms; }
.settings-view.open .settings-content > .control-row:nth-child(8) { transition-delay: 246ms; }
.settings-view.open .settings-content > .control-row:nth-child(9) { transition-delay: 260ms; }
.settings-view.open .settings-content > .control-row:nth-child(10) { transition-delay: 272ms; }

/* ===== CONTROL ROWS ===== */
/* Control rows (no cascade animation - DAW-friendly) */
.control-row {
  display: grid;
  grid-template-columns: 24px 1fr;
  row-gap: 24px;
  column-gap: 24px;
  align-items: center;
  overflow: visible;
}

.param-label {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 24px;
  height: 24px;
}

.param-label svg {
  width: 24px;
  height: 24px;
  opacity: 0.8;
  transition: opacity 0.2s ease;
}

/* Hover effect for visual feedback */
.control-row:hover .param-label svg {
  opacity: 1;
}

/* ===== ICON TOOLTIPS ===== */
/* Minimal tooltip using readout text styles, appears on hover after delay */
.param-label {
  position: relative;
}

.param-label[data-tooltip]::after {
  content: attr(data-tooltip);
  position: absolute;
  left: 50%;
  top: calc(100%);
  transform: translateX(-50%);
  z-index: 10;
  
  /* Readout text style */
  font-size: 12px;
  line-height: 1;
  color: var(--text);
  white-space: nowrap;
  
  /* Subtle background for legibility */
  background: rgba(49, 49, 43, 0.9);
  padding: 4px 8px;
  border-radius: 4px;
  
  /* Invisible by default */
  opacity: 0;
  pointer-events: none;
  
  /* Delay before appearing */
  transition: opacity 180ms ease 400ms;
}

/* Show tooltip on hover (after delay) */
.control-row:hover .param-label[data-tooltip]::after {
  opacity: 0.6;
}

/* Edge protection: if tooltip would overflow right, position left instead */
/* (Using CSS container queries would be ideal but fallback to JS if needed) */

/* Screen reader only - keeps text accessible but visually hidden */
.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

/* ===== ELASTIC SLIDER (Organic Curve Design) ===== */
.elastic-slider {
  position: relative;
  width: 100%;
  height: 40px;
  display: flex;
  align-items: center;
  cursor: pointer;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  overflow: visible;
}

/* Fine control mode indicator (when holding Shift) */
.elastic-slider.fine-control {
  cursor: ew-resize;
}

/* Invisible track for pointer hit-testing */
.elastic-slider__track {
  position: absolute;
  inset: 0;
  background: transparent;
}

/* SVG container for organic curve */
.slider-svg {
  position: absolute;
  width: 100%;
  height: 100%;
  overflow: hidden;
  pointer-events: none;
}

/* Curved path - 2pt stroke */
.slider-path {
  stroke: var(--text);
  stroke-width: 1.5;
  stroke-linecap: round;
  fill: none;
  transition: stroke 0.2s ease;
  vector-effect: non-scaling-stroke;
}

/* Circular thumb (16x16) - vertically centered with line */
.slider-thumb {
  position: absolute;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--text);
  top: 50%;
  left: 0;
  transform: translate(-50%, -50%);
  pointer-events: auto;
  cursor: pointer;
  /* Only transition background color, not position/transform */
  transition: background 0.2s ease;
}

/* Hover state - lime accent */
.elastic-slider:hover .slider-path,
.control-row:hover .slider-path {
  stroke: var(--accent);
}

.elastic-slider:hover .slider-thumb,
.control-row:hover .slider-thumb {
  background: var(--accent);
}

/* Active/dragging state - no transition for immediate response */
.elastic-slider.active .slider-path,
.elastic-slider.active .slider-thumb {
  transition: none;
}

/* Hide legacy slider elements */
.slider-container {
  display: none;
}

.slider-track-bg,
.slider-track-base,
.slider-track-macro,
.param-slider {
  display: none;
}

/* ===== REDUCED MOTION ===== */
@media (prefers-reduced-motion: reduce) {
  *,
  *::before,
  *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }

  /* Disable blur and stagger effects under reduced motion */
  .preset-dropdown,
  .settings-view,
  .settings-title,
  .settings-content > .control-row,
  .preset-option {
    transition-delay: 0ms !important;
    transform: none !important;
    filter: none !important;
  }
}
