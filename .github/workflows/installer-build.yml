name: installer-build

on:
  workflow_dispatch:
  pull_request:

jobs:
  macos:
    runs-on: macos-14
    env:
      APPLE_DEVELOPER_ID_APP: ${{ secrets.APPLE_DEVELOPER_ID_APP }}
      APPLE_DEVELOPER_ID_INSTALLER: ${{ secrets.APPLE_DEVELOPER_ID_INSTALLER }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Import code signing certificates
        if: ${{ env.APPLE_CERTIFICATE_P12 != '' }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)
          echo "$APPLE_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: Build installer (macOS)
        run: |
          SIGN_ARGS=""
          if [[ -n "${APPLE_CERTIFICATE_P12:-}" && -n "${APPLE_DEVELOPER_ID_APP:-}" && -n "${APPLE_DEVELOPER_ID_INSTALLER:-}" ]]; then
            SIGN_ARGS="--sign"
          fi
          if [[ -n "${SIGN_ARGS}" && -n "${APPLE_ID:-}" && -n "${APPLE_APP_SPECIFIC_PASSWORD:-}" && -n "${APPLE_TEAM_ID:-}" ]]; then
            SIGN_ARGS="--sign --notarize"
          fi
          ./scripts/build-installer.sh macos ${SIGN_ARGS}

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: unravel-macos-installer
          path: dist/*.pkg

  windows:
    runs-on: windows-latest
    env:
      INNO_SETUP_PATH: "C:\\Program Files (x86)\\Inno Setup 6\\ISCC.exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer (Windows)
        shell: pwsh
        run: ./scripts/build-installer.ps1

      - name: Sign Windows installer (Azure Artifact Signing)
        if: ${{ secrets.AZURE_CLIENT_ID != '' }}
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: https://eus.codesigning.azure.net/
          signing-account-name: threadbare-design
          certificate-profile-name: unravel-code-signing
          files: ${{ github.workspace }}\Output\Unravel-Installer.exe
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: true
          exclude-azure-powershell-credential: true
          exclude-azure-developer-cli-credential: true

      - name: Verify signed installer
        if: ${{ secrets.AZURE_CLIENT_ID != '' }}
        shell: pwsh
        run: signtool verify /pa /v "$env:GITHUB_WORKSPACE\Output\Unravel-Installer.exe"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: unravel-windows-installer
          path: Output\Unravel-Installer.exe
